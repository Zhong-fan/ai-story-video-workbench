  - heading "第 1 章 / 外滩重影" [level=2] [ref=e38]
  - article [ref=e39]: 耳机里调度台的女声冷得像刀片：「目标位于外滩防汛墙后第三排红砖仓库，信号强度三级，立即执行清除。」 林深关掉通讯，推开锈迹斑斑的铁门。江风裹着腐木和铁锈的气味涌出来，他眯了眯眼。 黑暗中，有什么东西在重复。 一个半透明的女人伏在积满灰尘的木桌上，反复擦拭同一块并不存在的污渍。她的轮廓像被水泡过的旧胶片，边缘不断晕染又聚拢，每擦一次，空气里就荡开一圈微弱的涟漪。 回声。别人看不见，但对他来说，就像有人在黑暗里反复播放同一帧。 林深把手探进外套内侧，指尖触到局里配发的抑制器。冰冷的金属外壳已经被体温焐热了半截。他朝那团重复的影像走了三步—— 然后停住了。 桌边蹲着一个人。 黑色连帽卫衣，左手掌心贴在地上那摊不知积了多久的脏水里。水面正泛起奇异的震颤，与桌上那抹半透明人影的擦拭节奏完全同步。她的嘴唇翕动，声音压得很低，却让空气中的涟漪一层一层慢下来。 回声的循环从两秒一次拉长到四秒，再到六秒，最后几乎停滞。 女人的影像停住后，轮廓反而变清晰了些。能看出是个盘发的年轻女子，手指姿势悬在杯沿——她在倒水。林深忽然意识到，不是擦拭，是反复倒水。倒完，看一眼门口，再倒一次。 「离开这里。」林深开口。 蹲在地上的人抬起头。帽檐下露出的脸比想象中年轻，二十出头，眼尾微挑。目光里没有惊讶，像是早就察觉他来了。 「你才是该走的那个。」她收回贴着水面的手，站起来。手套指尖湿漉漉的，滴下的水珠砸在寂静里，声音轻而脆。「这组回声很完整，没被干扰过。你一动它，就会碎。」 林深盯着她的手。 那种安抚不是普通人能做到的。他见过两个同类，都在局里的档案里，后面标注着「已管控」。眼前这个显然不在名单上。 「你什么时候开始能看见的？」他问。 「跟你有关系？」她侧身挡在回声源前面，「官方打手对吧？你们局里的人只会一种处理方式——暴力清除。你知不知道这种回声一旦被破坏，残留的信息碎片更难控制？」 她说得没错。抑制器的作用原理是强制覆盖回声频率，相当于用噪声淹没信号。被清除过的现场往往残留下更混乱的碎片——反复跳帧、咬尾、甚至拼接出全新的假象。林深不止一次在清除后，看见空气里突然闪过完全陌生的脸，张嘴喊无声的名字。 那种时候他会想起六岁时的某个傍晚。 父亲去世后第三天，他蹲在客厅角落玩积木。抬头时，看见父亲从卧室走出来，站在玄关镜子前反复整理领带。领带只有半截，末端模糊成絮状，父亲的手指穿过去，再退出来，一遍又一遍。 像忘了自己已经不在。 他喊了一声「爸」。那影像就碎了，碎成无数光点落在地板上，再也没拼回去。 后来他把这件事告诉母亲，换来半年的心理干预治疗。再后来他学会闭嘴，学会在无意中瞥见那些重复影像时装作什么也没看到。再后来，局里的人找到了他。 「让开。」林深拔出抑制器，拇指压在激活键上。 女人没退。 「这组回声里藏着一个坐标。」她的语速加快了，「她已经重复倒水一千四百多次，每次都在看门口。她在等一个人送信。你感受不到她的急切吗？」 她重新蹲下去，手再次按进水渍里，闭上眼。 水面震动加剧。桌上的女人影像突然加速，疯狂倒水，水从虚拟的杯口溢出，一滴滴砸在影像与现实交界的边缘，发出类似无线电杂讯的滋滋声。 林深感觉到不对——回声的频率在陡升，像将断的琴弦被人拧到极限。 他一把抓住女人的肩膀往后拽：「停下！你在把它逼到临界点！」 「我在把信息拉出来——」 她甩开他的手。两人肢体碰撞的瞬间，抑制器脱手掉进水里。 短路炸起一蓬蓝白色电火花。整摊脏水翻滚沸腾，桌上的回声彻底失控。女人影像像被撕扯的布帛从中裂开，炸出的光团填满整个仓库。 林深下意识抬手挡眼。光穿过手臂直刺瞳孔—— 他看见了。 一个男人的人影从水中站立起来。 不是重复的影像。是完整、稳定、几乎像真人一样的形。中年，旧式中山装，右胸口袋插着一支钢笔。他看着虚空中某一点，开口说话。声音像隔着厚玻璃传来，模糊，但每个字都凿进耳膜： 「北纬三十一度十四分……东经一百二十一度二十九分……北纬三十一度十四分……东经一百二十一度二十九分……」 同一秒，林深的耳机炸响调度台的紧急指令：「现场信号突破临界值！立即撤回！封锁队伍两分钟内到达！所有人员强制撤离！」 他转头看那女人。 她也在听——没有耳机，但她的耳朵里显然有另一种接收方式。她脸色发白，嘴唇哆嗦着重复了一遍那个坐标，猛地抬起头，与林深目光撞在一起。 那一瞬，两人都听见了脑子里的同一个声音。 不是男人的。是那个倒水女人急切的心跳，混在数字里，咚、咚、咚，像敲门。 人影开始崩解。从脚底向上化为灰白颗粒，中山装的轮廓摇曳着收缩，嘴巴还在动，但最后两个字被江风吞没了。整个人影坍塌成水面上一圈极缓极淡的波纹，然后归于沉寂。 仓库外传来急刹车声，沉重的靴子踩碎砂石。 封锁队到了。 「出口，西南角高窗。」林深说这句话时没看那女人。他弯腰从水里捡起抑制器，残存的电流刺得指尖发麻。 她愣了一下，什么也没说。转身踩着落灰的货架攀上去，勾住窗框翻身而出。动作干净利落，只在窗台留下一小摊水渍。 林深直到听见封锁队破门的声音，才从正门走出去。 领队的张组长看见他，立刻递上包裹证物用的封口袋：「林队，现场交给我们，您先撤。」 他点头，接过封口袋。路过一辆辆闪着红蓝警示灯的车，拐进无人的巷弄，掏出手机。 搜索栏输入那串数字后，地图跳出结果：浦东某废弃船务码头，7号泊位。 他背靠湿冷的砖墙，闭上眼。 眼前不是仓库里的异变，而是六岁那年碎在地板上的光点。 清除科的操作手册第一条写着：回声是时空损伤留下的疤痕，必须清除以防止扩散。 但今天那组影像里，有人反复倒水等人送信。有人从水中站起，说出坐标。 疤痕不会传递信息。 他收起手机，把那串数字默念了三遍，然后朝地铁站走去。 耳机里调度台的声音还在继续，他没回。 身后，江风穿过仓库破窗，吹干了窗台的水痕。